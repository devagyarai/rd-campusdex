name: CI Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Prisma Validate (Migration Check)
      run: npx prisma validate

    - name: Run Security Audit (NPM)
      run: npm audit --audit-level=high

    - name: OSV-Scanner Vulnerability Sweep
      uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
      with:
        scan-args: |-
          -r
          --skip-git
          ./

    - name: Run Vitest Unit & API Tests with Coverage
      run: npx vitest run --coverage

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E Tests
      run: npx playwright test

    - name: Upload Test Artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
