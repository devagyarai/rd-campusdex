name: CI Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: campusdex_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    env:
      DATABASE_URL: mysql://root:root@127.0.1:3306/campusdex_test
      JWT_SECRET: test-secret-key-that-is-long-enough-32-chars
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: test
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: test
      CRON_SECRET: test-cron-secret-16-chars
      NODE_ENV: test

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Prisma Validate (Migration Check)
      run: npx prisma validate

    - name: Run Prisma DB Push (Test DB Setup)
      run: npx prisma db push --accept-data-loss

    - name: Run Security Audit (NPM)
      run: npm audit --audit-level=high || true

    - name: OSV-Scanner Vulnerability Sweep
      uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
      with:
        scan-args: |-
          -r
          --skip-git
          ./

    - name: Run Vitest Unit & API Tests
      run: npx vitest run

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E Tests
      run: npx playwright test

    - name: Upload Test Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
